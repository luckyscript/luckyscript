<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#0d1117" rx="100"/>

  <!-- Pixel grid pattern -->
  <defs>
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="none" stroke="#161b22" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#grid)" rx="100" opacity="0.3"/>

  <!-- Bytecode text elements scattered -->
  <text x="15" y="30" font-family="monospace" font-size="8" fill="#1a5c3a" opacity="0.6">01001011</text>
  <text x="15" y="45" font-family="monospace" font-size="8" fill="#1a5c3a" opacity="0.5">10110101</text>
  <text x="120" y="30" font-family="monospace" font-size="8" fill="#1a5c3a" opacity="0.6">01111001</text>
  <text x="125" y="45" font-family="monospace" font-size="8" fill="#1a5c3a" opacity="0.4">11001101</text>
  <text x="10" y="170" font-family="monospace" font-size="8" fill="#1a5c3a" opacity="0.4">00110110</text>
  <text x="115" y="175" font-family="monospace" font-size="8" fill="#1a5c3a" opacity="0.5">10100100</text>
  <text x="10" y="185" font-family="monospace" font-size="8" fill="#1a5c3a" opacity="0.3">11010011</text>
  <text x="110" y="188" font-family="monospace" font-size="8" fill="#1a5c3a" opacity="0.4">01101110</text>

  <!-- Pixel art head - 8-bit style -->
  <!-- Hair -->
  <rect x="60" y="50" width="80" height="10" fill="#1f6feb"/>
  <rect x="50" y="60" width="20" height="10" fill="#1f6feb"/>
  <rect x="130" y="60" width="20" height="10" fill="#1f6feb"/>

  <!-- Face -->
  <rect x="50" y="70" width="100" height="10" fill="#e6b980"/>
  <rect x="45" y="80" width="110" height="10" fill="#e6b980"/>
  <rect x="45" y="90" width="110" height="10" fill="#e6b980"/>
  <rect x="45" y="100" width="110" height="10" fill="#e6b980"/>
  <rect x="50" y="110" width="100" height="10" fill="#e6b980"/>

  <!-- Eyes -->
  <rect x="65" y="85" width="15" height="10" fill="#0d1117"/>
  <rect x="120" y="85" width="15" height="10" fill="#0d1117"/>

  <!-- Glasses -->
  <rect x="60" y="83" width="25" height="14" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <rect x="115" y="83" width="25" height="14" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <rect x="85" y="88" width="30" height="4" fill="none" stroke="#58a6ff" stroke-width="2"/>

  <!-- Smile -->
  <rect x="75" y="105" width="50" height="5" fill="#c17c5e"/>

  <!-- Hoodie/Body -->
  <rect x="40" y="120" width="120" height="10" fill="#238636"/>
  <rect x="35" y="130" width="130" height="10" fill="#238636"/>
  <rect x="30" y="140" width="140" height="10" fill="#238636"/>
  <rect x="30" y="150" width="140" height="20" fill="#2ea043"/>

  <!-- Hoodie drawstring -->
  <rect x="90" y="120" width="5" height="20" fill="#1a7f37"/>
  <rect x="105" y="120" width="5" height="20" fill="#1a7f37"/>

  <!-- "&lt;/&gt;" on hoodie -->
  <text x="82" y="147" font-family="monospace" font-size="11" fill="#ffffff" font-weight="bold">&lt;/&gt;</text>

  <!-- Keyboard hands -->
  <rect x="20" y="165" width="30" height="10" fill="#e6b980"/>
  <rect x="150" y="165" width="30" height="10" fill="#e6b980"/>

  <!-- Pixel keyboard -->
  <rect x="25" y="178" width="150" height="8" fill="#30363d" rx="2"/>
  <rect x="30" y="180" width="8" height="4" fill="#484f58"/>
  <rect x="42" y="180" width="8" height="4" fill="#484f58"/>
  <rect x="54" y="180" width="8" height="4" fill="#484f58"/>
  <rect x="66" y="180" width="8" height="4" fill="#484f58"/>
  <rect x="78" y="180" width="8" height="4" fill="#58a6ff"/>
  <rect x="90" y="180" width="20" height="4" fill="#484f58"/>
  <rect x="114" y="180" width="8" height="4" fill="#58a6ff"/>
  <rect x="126" y="180" width="8" height="4" fill="#484f58"/>
  <rect x="138" y="180" width="8" height="4" fill="#484f58"/>
  <rect x="150" y="180" width="8" height="4" fill="#484f58"/>

  <!-- Small green glow accents -->
  <circle cx="55" cy="75" r="3" fill="#2ea043" opacity="0.7"/>
  <circle cx="145" cy="75" r="3" fill="#2ea043" opacity="0.7"/>
</svg>
